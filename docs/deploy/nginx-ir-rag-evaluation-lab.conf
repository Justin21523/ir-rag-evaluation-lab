# Add inside the existing dothost nginx server block.
# Static frontend files are uploaded to:
# /home/neojustin/public_html/projects/ir-rag-evaluation-lab
# FastAPI runs on remote localhost:8031.

location = /projects/ir-rag-evaluation-lab {
    return 301 /projects/ir-rag-evaluation-lab/;
}

location ^~ /projects/ir-rag-evaluation-lab/api/ {
    proxy_pass http://127.0.0.1:8031/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 180s;
    proxy_buffering off;
    proxy_cache off;
}

location ^~ /projects/ir-rag-evaluation-lab/ {
    alias /home/neojustin/public_html/projects/ir-rag-evaluation-lab/;
    try_files $uri $uri/ /projects/ir-rag-evaluation-lab/index.html;
}
